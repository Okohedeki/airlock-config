airlock: "0.1"

agent:
  name: acme-supplier-agent
  version: 2.3.0
  description: |
    Handles PO confirmations, delivery date changes, and cancellations
    for inbound orders from known enterprise customers. Exposed over HTTP
    at /.well-known/airlock.yaml.
  channels: [http]
  homepage: https://acme.example.com/agents/supplier
  contact:
    name: Acme Supplier Ops
    email: agents@acme.example.com

schemas:
  PurchaseOrder:
    type: object
    required: [reference, entity, amount]
    properties:
      reference:
        type: string
        pattern: "^PO-[0-9]+$"
      entity:
        type: string
      amount:
        type: number
        minimum: 0
      delivery_date_change_days:
        type: integer
        description: Requested adjustment to delivery date, in days. Positive = later.
      quantity_change_pct:
        type: number
        description: Requested change in quantity, as a percent of the original.
  Confirmation:
    type: object
    properties:
      confirmation_id:
        type: string
      confirmed_date:
        type: string
        format: date

skills:
  - id: confirm_po
    description: Confirm a purchase order, with optional date or quantity adjustment.
    input:
      $ref: "#/schemas/PurchaseOrder"
    output:
      $ref: "#/schemas/Confirmation"
    examples:
      - name: happy-path-small-date-change
        description: Two-day pull-in on delivery — within the auto-accept band.
        in:
          reference: PO-1234
          entity: known-supplier-1
          amount: 100
          delivery_date_change_days: -2
        out:
          confirmation_id: C-9001
          confirmed_date: "2026-05-30"
        expected_verdict:
          code: ACCEPTED_BY_RULE
          binding: PROMISE
          ref: accept-small-date-changes
      - name: out-of-scope-entity
        description: Caller is an entity we don't recognize.
        in:
          reference: PO-9999
          entity: random-vendor
          amount: 50
        expected_verdict:
          code: OUT_OF_SCOPE
          binding: PROMISE
          ref: unknown-entity

  - id: cancel_po
    description: Cancel a previously confirmed purchase order.
    input:
      type: object
      required: [reference]
      properties:
        reference:
          type: string
        reason:
          type: string
    output:
      type: object
      properties:
        canceled: { type: boolean }

authority:
  - id: accept-small-date-changes
    description: |
      Delivery date adjustments within ±3 days are accepted unilaterally —
      the math is the math, no judgment required.
    skill: confirm_po
    field: delivery_date_change_days
    binding_class: deterministic
    when: "abs(input.delivery_date_change_days) <= 3"
    then:
      code: ACCEPTED_BY_RULE
      action: UNILATERAL_COMMIT

  - id: counter-large-quantity-changes
    description: |
      Quantity changes beyond ±5% need a counter-offer pass — we'll respond
      with what we can actually fulfil rather than refuse outright.
    skill: confirm_po
    field: quantity_change_pct
    binding_class: judgment
    when: "abs(input.quantity_change_pct) > 5"
    then:
      code: COUNTER_OFFER_LIKELY
      action: COUNTER_OFFER
      message: We will counter with the largest in-stock quantity.

  - id: review-large-date-changes
    description: |
      Date adjustments beyond ±3 days fall into human review.
    skill: confirm_po
    field: delivery_date_change_days
    binding_class: judgment
    when: "abs(input.delivery_date_change_days) > 3"
    then:
      code: HUMAN_REVIEW_LIKELY
      action: ESCALATED_TO_HUMAN

instant_failures:
  - id: unknown-entity
    description: We only do business with entities we've onboarded.
    when: "input.entity != 'known-supplier-1' and input.entity != 'known-supplier-2'"
    code: OUT_OF_SCOPE
    message: We don't recognize that entity.

  - id: missing-reference
    description: All PO operations require a reference number.
    when: "input.reference == null"
    code: MISSING_INPUT
    skill: confirm_po

actions:
  exposes:
    - UNILATERAL_COMMIT
    - COUNTER_OFFER
    - PARTIAL_FULFILLMENT
    - ESCALATED_TO_HUMAN

sla:
  confirm_po:
    respond_within: "5m"
    on_breach: ESCALATED_TO_HUMAN
  cancel_po:
    respond_within: "1h"
    on_breach: ESCALATED_TO_HUMAN

lifecycle:
  states:
    - SUBMITTED
    - WORKING
    - COMPLETED
    - FAILED
    - ESCALATED
