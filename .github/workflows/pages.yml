name: Publish Airlock Config site to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "examples/**.airlock-config.yaml"
      - "src/**"
      - "schema/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/pages.yml"
  workflow_dispatch:
    inputs:
      featured:
        description: "Agent name to feature on the home page CTA (default: supplier-agent)"
        required: false

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build (compile TS + playground)
        run: npm run build

      - name: Build site (home page + all example bundles)
        env:
          FEATURED: ${{ github.event.inputs.featured }}
        run: |
          if [ -n "$FEATURED" ]; then
            node dist/cli.js build-site --out ./pages-out --featured "$FEATURED"
          else
            node dist/cli.js build-site --out ./pages-out
          fi

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./pages-out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
