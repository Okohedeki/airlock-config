name: Publish Airlock contract to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "examples/**.airlock.yaml"
      - "src/**"
      - "schema/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/pages.yml"
  workflow_dispatch:
    inputs:
      contract:
        description: "Path to the contract YAML to publish"
        default: "examples/agent-harness.airlock.yaml"
        required: true

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build (compile TS)
        run: npm run build

      - name: Build static bundle
        env:
          CONTRACT: ${{ github.event.inputs.contract || 'examples/agent-harness.airlock.yaml' }}
        run: node dist/cli.js build "$CONTRACT" --out ./pages-out

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./pages-out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
